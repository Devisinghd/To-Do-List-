<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TaskSphere{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{% url 'mytodo:main' %}">
                <h1 class="text-white text-2xl font-bold tracking-wide">
                📋 TaskSphere
                </h1>
            </a>

            <div class="flex gap-3">
                <a href="{% url 'users:login' %}" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition">
                    Log in
                </a>
                <a href="{% url 'users:logout' %}" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition">
                    Log out
                </a>
            </div>
        </div>
    </header>
    {% if messages %}
        {% for message in messages %}
            <div class="max-w-5xl mx-auto px-4 py-2 mb-4 rounded-lg bg-gray-100 text-gray-800">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}                                    

    <!-- Main Container -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-10">
        <div class="max-w-5xl mx-auto px-4 py-4 text-center text-sm text-gray-500">
            © 2026 TaskSphere. All rights reserved.
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>

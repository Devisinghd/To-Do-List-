<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}To-Do App{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        header {
            background: #007bff;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .task-title {
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
            text-decoration: none;
            color: #007bff;
        }

        .add-btn:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    📋 To-Do App
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 To-Do App
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>

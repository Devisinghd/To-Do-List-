{% extends 'myapp/base.html' %}
{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-50">
  <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full mx-4">
    <div class="text-center">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
        <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
      </div>
      <h2 class="text-xl font-semibold text-gray-900 mb-2">Delete Task</h2>
      <p class="text-sm text-gray-600 mb-6">Are you sure you want to delete this task? This action cannot be undone.</p>
    </div>

    <div class="bg-gray-50 rounded-lg p-4 mb-6">
      <h3 class="font-medium text-gray-900">{{ task.name }}</h3>
      <p class="text-sm text-gray-500 mt-1">{{ task.time }}</p>
    </div>

    <form method="POST" class="flex space-x-3">
      {% csrf_token %}
      <a href="{% url 'mytodo:main' %}" class="flex-1 bg-gray-200 text-gray-800 py-2 px-4 rounded-lg font-medium hover:bg-gray-300 transition duration-200 text-center">Cancel</a>
      <button type="submit" class="flex-1 bg-red-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-red-700 transition duration-200">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
